name: Awesome Lint

on:
  push:
    branches: [main]
    paths: ['README.md']
  pull_request:
    branches: [main]
    paths: ['README.md']

jobs:
  awesome-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run awesome-lint
        run: npx awesome-lint
