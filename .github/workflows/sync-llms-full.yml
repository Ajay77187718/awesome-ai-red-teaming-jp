name: Sync llms-full.txt

on:
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'README.en.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate llms-full.txt
        run: |
          cat README.en.md > llms-full.txt
          echo "" >> llms-full.txt
          echo "---" >> llms-full.txt
          echo "" >> llms-full.txt
          echo "# 日本語版 / Japanese Version" >> llms-full.txt
          echo "" >> llms-full.txt
          cat README.md >> llms-full.txt

      - name: Commit if changed
        run: |
          git diff --quiet llms-full.txt && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add llms-full.txt
          git commit -m "🤖 Auto-sync llms-full.txt from READMEs"
          git push
